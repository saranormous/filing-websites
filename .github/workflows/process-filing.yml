name: Process IPO Filing

on:
  workflow_dispatch:
    inputs:
      pdf_url:
        description: 'URL to the prospectus PDF'
        required: true
        type: string
      slug:
        description: 'Directory name for the filing (e.g., deepseek)'
        required: true
        type: string
      name_en:
        description: 'Company name in English (e.g., DeepSeek)'
        required: true
        type: string
      name_cn:
        description: 'Company name in Chinese (e.g., 深度求索)'
        required: false
        type: string
        default: ''
      exchange:
        description: 'Exchange (e.g., "HKEX Main Board · Chapter 18C")'
        required: false
        default: 'HKEX Main Board · Chapter 18C'
        type: string
      sector:
        description: 'Sector (e.g., "Foundation Models / AGI")'
        required: false
        default: 'AI'
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y poppler-utils
          pip install anthropic

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 pipeline.py --yes --vision "${{ inputs.pdf_url }}" "${{ inputs.slug }}"

      - name: Update filings.json
        run: |
          python3 -c "
          import json, datetime
          with open('filings.json') as f:
              filings = json.load(f)
          if not any(f['slug'] == '${{ inputs.slug }}' for f in filings):
              filings.append({
                  'slug': '${{ inputs.slug }}',
                  'name_en': '${{ inputs.name_en }}',
                  'name_cn': '${{ inputs.name_cn }}',
                  'exchange': '${{ inputs.exchange }}',
                  'sector': '${{ inputs.sector }}',
                  'filed': datetime.date.today().isoformat(),
                  'status': 'Draft',
                  'stats': []
              })
              with open('filings.json', 'w') as f:
                  json.dump(filings, f, indent=2, ensure_ascii=False)
              print('Added to filings.json')
          else:
              print('Already in filings.json')
          "

      - name: Rebuild index
        run: python3 pipeline.py --rebuild-index

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add ${{ inputs.name_en }} (${{ inputs.slug }}) IPO prospectus

          Source: ${{ inputs.pdf_url }}
          Generated by pipeline.py via GitHub Actions"
          git push
